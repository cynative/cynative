# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/cynative
    ldflags:
      - -s -w
      - -X github.com/cynative/cynative/internal/cli.version={{.Version}}
      - -X github.com/cynative/cynative/internal/cli.commit={{.ShortCommit}}
      - -X github.com/cynative/cynative/internal/cli.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cmd: scripts/release/sign-darwin-binary.sh "{{ .Path }}" "{{ .Target }}" "{{ .IsSnapshot }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

scoops:
  - repository:
      owner: cynative
      name: scoop-bucket
      branch: main
    # skip_upload: goreleaser still generates dist/bucket/cynative.json but no
    # longer pushes it during the pre-publish build (cynative#103). The live
    # manifest is rendered and pushed after publish by
    # scripts/release/render-scoop.sh + publish-scoop.sh, which is the
    # authoritative renderer; the fields below only shape goreleaser's inert
    # local copy.
    skip_upload: true
    # Scoop's recommended layout keeps manifests in a `bucket/` subdirectory
    # (mirrors the official ScoopInstaller bucket template).
    directory: bucket
    homepage: "https://github.com/cynative/cynative"
    description: "Agentic security research across your code, cloud, and runtime (read-only)"
    license: "Apache-2.0"

release:
  # Immutable-releases handoff:
  # release-please creates a DRAFT titled exactly like the tag (e.g. "v0.4.0").
  # goreleaser must adopt that draft — matched by draft title == the git tag
  # string (hardcoded in findRelease) — keep its changelog body, upload, and
  # STOP. With draft: true goreleaser's publish step is a no-op; the release
  # workflow owns the publish PATCH, which is the instant the release (assets
  # + tag) becomes immutable, and runs it only after all assertions pass.
  draft: true
  use_existing_draft: true
  mode: keep-existing

changelog:
  disable: true
