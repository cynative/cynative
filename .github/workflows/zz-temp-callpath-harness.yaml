name: TEMP call-path harness

# TEMPORARY. Deleted in the final commit of this PR; a squash merge means it never
# reaches main.
#
# Proves the reusable-workflow call path the Release Pipeline now depends on, which
# cannot otherwise be tested before merge: release.yaml only runs on push to main, and a
# brand-new workflow cannot be manually dispatched until it is on the default branch
# (GitHub returns HTTP 404).
#
# It passes BOTH inputs the release caller passes, so the shape under test is the real
# one:
#   1. `gate: true` must reach the called workflow's detect job so the live job actually
#      RUNS. If it did not, the live job would skip, and a skipped job reports SUCCESS to
#      its caller - the release would publish having tested nothing. The called workflow's
#      `gate-assert` job is what turns that silence into a failure, and it too only runs
#      on this path, so this is the only place it gets exercised.
#   2. `ref` must be honoured, so the gate tests the commit being released rather than
#      whatever triggered the pipeline.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gcp:
    name: TEMP GCP call path
    # Same fork-trust boundary as the real caller: no fork PR may reach the credentials.
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/connector-gcp-e2e.yaml
    with:
      gate: true
      ref: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      id-token: write

  aws:
    name: TEMP AWS call path
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/connector-aws-e2e.yaml
    with:
      gate: true
      ref: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      id-token: write
