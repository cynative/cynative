name: Homebrew install smoke

# Post-release public-channel check (cynative#45): prove the documented
# `brew install cynative/tap/cynative` serves the expected release, the
# installed binary reports exactly that version, and uninstall is clean.
# Two entry points, no PR trigger: the Release Pipeline calls it right after
# the tap push (workflow_call, tag input), and maintainers can dispatch it
# manually against the latest published release. Both jobs carry explicit
# timeout-minutes: a caller job that `uses:` a reusable workflow cannot set
# one, and on the call path a wedged job would otherwise hold the
# release-pipeline concurrency group for the default 360 minutes.
on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to smoke (e.g. v0.4.0)
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve version & wait for tap
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      # Dispatch resolves the latest published release; any other event is
      # the call path, which must carry a non-empty tag (required: true is
      # not enforced at runtime, and silently falling through to the latest
      # release could green-light the wrong version).
      - name: Resolve expected version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" \
              || { echo "::error::no published release to smoke"; exit 1; }
          else
            tag="${TAG_INPUT}"
            [ -n "${tag}" ] || { echo "::error::empty tag input on the workflow_call path"; exit 1; }
          fi
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "expecting cynative ${tag#v}"

      # The tap push completes before the caller reaches this workflow, so
      # this poll is propagation defense (and absorbs a manual dispatch racing
      # a still-running release): 30s interval, 10 minute budget. Each probe
      # is an anonymous shallow git clone of the public tap - the same
      # mechanism brew itself uses to fetch a tap, with none of the REST
      # rate-limit or cross-repo token-scope questions (GITHUB_TOKEN is scoped
      # to this repository, not the tap). Deliberately not
      # raw.githubusercontent.com: no freshness guarantee.
      - name: Wait for the tap to serve the version
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          last="no probe yet"
          for attempt in $(seq 1 20); do
            rm -rf /tmp/tap-probe
            if git clone --quiet --depth 1 \
                https://github.com/cynative/homebrew-tap /tmp/tap-probe 2>/tmp/poll-err; then
              if grep -Fq "version \"${VERSION}\"" /tmp/tap-probe/Formula/cynative.rb 2>/dev/null; then
                echo "tap serves ${VERSION} (attempt ${attempt})"
                exit 0
              fi
              last="tap cloned but formula version != ${VERSION}"
            else
              last="$(tr -d '\n' < /tmp/poll-err)"
            fi
            echo "attempt ${attempt}/20: tap not serving ${VERSION} yet (${last})"
            sleep 30
          done
          echo "::error::tap did not serve version ${VERSION} within 10 minutes; last: ${last}"
          exit 1

  smoke:
    name: brew install (${{ matrix.os }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # ubuntu runners ship Homebrew off PATH; macos runners have it on PATH.
      - name: Add Homebrew to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "/home/linuxbrew/.linuxbrew/bin" >> "${GITHUB_PATH}"
      - name: Install, verify, uninstall via brew
        env:
          SMOKE_VERSION: ${{ needs.resolve.outputs.version }}
        run: sh test/homebrew.smoke.test.sh
