name: Live GCP connector e2e

# Runs the real `cynative -p` against the cynative-cli-ci GCP project through the
# gcp connector (cynative#39): a read of the project's own metadata plus a
# write-deny canary, proving read-only enforcement end to end. Mirrors
# llm-smoke.yaml's detect gating so the heavy live run only fires for
# release-please PRs or a manual dispatch. Authenticates via keyless Workload
# Identity Federation; the credential step is gated to same-repo events so
# untrusted forks never reach it. Not a required status check. Unlike the llm
# smoke, this run DOES expose GCP ADC to cynative so the gcp connector registers.
#
# Three entry points. The Release Pipeline calls it as a PRE-PUBLISH GATE
# (workflow_call with gate: true), so a release cannot publish while the read-only
# boundary is broken; maintainers can dispatch it manually; and it self-gates on PRs to
# release-please only.
on:
  workflow_call:
    inputs:
      gate:
        description: Force the live run (the Release Pipeline sets this to gate publish).
        type: boolean
        default: false
      ref:
        description: >-
          Commit to test. The Release Pipeline passes the SHA the release was tagged at,
          which is not necessarily the SHA that triggered the pipeline. Empty means the
          default checkout ref.
        type: string
        default: ''
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

# A stale synchronize event must not multiply live-run spend, so PR runs dedupe per PR
# and cancel their predecessor.
#
# The gate path gets a group of its own, keyed on the run id. A called workflow's
# concurrency group is evaluated in the CALLER's context, so without this a release's
# gate would share a group with any standalone run on the same ref (a manual dispatch,
# say) and could be queued behind it or cancelled by it. A cancelled gate fails
# gate-assert below, blocking a release for a reason that has nothing to do with the
# release. Cancellation stays scoped to pull_request runs for the same reason.
concurrency:
  group: connector-gcp-e2e-${{ inputs.gate && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !inputs.gate }}

jobs:
  detect:
    name: Detect release-please PR
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - name: Detect release-please PR
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GATE: ${{ inputs.gate }}
        run: |
          relevant=false
          # The workflow_call path is the Release Pipeline's publish gate, and it MUST key
          # on the input rather than the event. A called workflow inherits the CALLER's
          # event (push), so an event check here would report "not relevant" and the live
          # job would SKIP.
          #
          # That would not merely be an inert gate, it would be a fail-OPEN one: GitHub
          # reports a conditionally skipped job as a SUCCESS to its caller, so publish's
          # `result == 'success'` check would be satisfied and the release would ship with
          # its read-only boundary never tested. The gate-assert job below is the backstop
          # that turns that silence into a hard failure.
          [ "${GATE}" = "true" ] && relevant=true
          [ "${EVENT}" = "workflow_dispatch" ] && relevant=true
          [ "${HEAD_REF}" = "release-please--branches--main" ] && relevant=true
          case ",${LABELS}," in *",autorelease: pending,"*) relevant=true ;; esac
          echo "relevant=${relevant}" >> "${GITHUB_OUTPUT}"
          if [ "${relevant}" = "true" ]; then
            echo "Release gate, release-please PR, or manual dispatch - running the live GCP connector e2e."
          else
            echo "Not a release-please PR - skipping the live GCP connector e2e."
          fi

  gcp-connector:
    name: GCP connector read + canary
    needs: detect
    # Run only when relevant AND on a trusted path: this repository's own Release
    # Pipeline gate (which only ever runs from an already-merged commit on main), a manual
    # dispatch (no PR context), or a same-repo PR.
    #
    # The `github.repository` guard is not redundant. This is a PUBLIC reusable workflow,
    # so ANY public repository - including a fork - may call it, pass gate: true, and grant
    # itself id-token: write. The cloud trust policies would still refuse to mint
    # credentials (the WIF provider pins assertion.repository), but the guard is what
    # actually makes "a fork never reaches the credential step" true rather than merely
    # survivable.
    #
    # `inputs.gate` is undefined on every non-call event, and an undefined context property
    # is an empty string, which is falsy.
    if: >-
      github.repository == 'cynative/cynative' &&
      needs.detect.outputs.relevant == 'true' &&
      (inputs.gate ||
       github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # Headroom for two phases, each retried once, at the per-phase timeout below.
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # mint the OIDC token for Workload Identity Federation
    steps:
      # On the release path the caller passes the SHA the release was TAGGED at, which is
      # not necessarily the SHA that triggered the pipeline: release-please re-derives its
      # work from repository state, so main can advance in between. Testing the triggering
      # commit instead would gate the release on code that is not the code being released.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
      - name: Report tested SHA
        run: |
          echo "Testing SHA $(git rev-parse HEAD)"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      # Keyless WIF into cynative-cli-ci. Unlike the llm smoke,
      # GOOGLE_APPLICATION_CREDENTIALS IS exported downstream so the gcp connector
      # registers.
      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.CYNATIVE_CLI_CI_PROJECT }}
          workload_identity_provider: ${{ vars.CYNATIVE_CLI_CI_WIF_PROVIDER }}
          service_account: ${{ vars.CYNATIVE_CLI_CI_SA }}
          create_credentials_file: true
          export_environment_variables: false
      # The auth action writes an external_account creds file with no quota_project_id,
      # so cynative's ADC project resolution would find no project for its permission
      # catalog. Inject the fixture project (the same one cynative reads) as
      # quota_project_id, the field cynative reads as its fallback. Keeps the run keyless.
      - name: Add quota project to the WIF credentials file
        env:
          CREDS_FILE: ${{ steps.auth.outputs.credentials_file_path }}
          QUOTA_PROJECT: ${{ vars.GCP_E2E_PROJECT }}
        run: |
          tmp="$(mktemp)"
          jq --arg p "$QUOTA_PROJECT" '. + {quota_project_id: $p}' "$CREDS_FILE" >"$tmp"
          mv "$tmp" "$CREDS_FILE"
      - name: Run the GCP connector e2e
        env:
          # Vertex drives the loop; fed inline so it does not depend on ADC fallback,
          # while GOOGLE_APPLICATION_CREDENTIALS lights the gcp connector.
          CYNATIVE_LLM_PROVIDER: vertex
          CYNATIVE_LLM_MODEL: ${{ vars.CYNATIVE_CLI_CI_VERTEX_MODEL }}
          CYNATIVE_LLM_VERTEX_PROJECT_ID: ${{ vars.CYNATIVE_CLI_CI_PROJECT }}
          CYNATIVE_LLM_VERTEX_REGION: ${{ vars.CYNATIVE_CLI_CI_VERTEX_REGION }}
          GCP_E2E_PROJECT: ${{ vars.GCP_E2E_PROJECT }}
          GCP_E2E_EXPECT: ${{ vars.GCP_E2E_EXPECT }}
          # Generous per-phase limits (a tool-driven run needs more than the
          # no-tool defaults); the job timeout above bounds the whole run.
          GCP_E2E_TIMEOUT: "180"
          GCP_E2E_MAX_TOKENS: "100000"
          # Missing/renamed vars must fail the job, never silently skip.
          GCP_E2E_REQUIRE_RUN: "1"
          CREDS_FILE: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$CREDS_FILE"
          CYNATIVE_LLM_VERTEX_AUTH_CREDENTIALS="$(cat "$CREDS_FILE")"
          export CYNATIVE_LLM_VERTEX_AUTH_CREDENTIALS
          make connector-gcp-e2e

  # ---- The gate's fail-closed assertion --------------------------------------
  # A conditionally SKIPPED job reports success to its caller. So if the live job above
  # ever silently stops running on the gate path (a renamed input, a detect condition
  # that stops matching, a typo in the `if:`), this workflow would still conclude
  # "success" and the Release Pipeline would publish a release whose read-only boundary
  # was never tested. That is the one failure mode a safety gate must not have.
  #
  # This job exists purely to turn that silence into a hard failure. It runs only on the
  # gate path, and it demands the live job actually SUCCEEDED - not merely "did not fail".
  gate-assert:
    name: Assert the gate actually ran
    needs: [detect, gcp-connector]
    if: ${{ always() && inputs.gate }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: The live connector job must have succeeded
        env:
          RESULT: ${{ needs.gcp-connector.result }}
          RELEVANT: ${{ needs.detect.outputs.relevant }}
        run: |
          if [ "${RESULT}" != "success" ]; then
            echo "::error::The release gate was requested (gate: true) but the live GCP connector job did not succeed (result=${RESULT}, detect.relevant=${RELEVANT}). A skipped job reports success to the caller, so this assertion is what keeps the release gate fail-closed."
            exit 1
          fi
          echo "OK: the live GCP connector job ran and succeeded, so the gate is real."
