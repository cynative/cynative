name: TEMP connector e2e harness

# TEMPORARY. Deleted before this branch merges.
#
# Exercises connector-e2e.yaml with the exact shape release.yaml will use, so the
# consolidated gate is proven before the release path depends on it.
#
# Push-triggered, not workflow_dispatch, and that is load-bearing: a workflow_dispatch
# entry is only reliably dispatchable once the file is on the default branch, which is
# exactly what has not happened yet. A push trigger fires on any branch that carries the
# file, so the gate can be validated pre-merge.
#
# Branch-scoped so it can never fire on main. The negative-test branches deliberately
# break the gate to prove it fails closed.
on:
  push:
    branches:
      - refactor/consolidate-connector-e2e-workflows
      - tmp/negative-**

permissions:
  contents: read

jobs:
  gate:
    name: Live connector e2e
    # Mirrors release.yaml's caller job exactly: no gate input to pass, an explicit
    # 40-hex ref, one declared secret, and the id-token ceiling the OIDC legs need.
    uses: ./.github/workflows/connector-e2e.yaml
    with:
      ref: ${{ github.sha }}
    secrets:
      GH_E2E_APP_PRIVATE_KEY: ${{ secrets.GH_E2E_APP_PRIVATE_KEY }}
    permissions:
      contents: read
      id-token: write

  assert:
    name: Assert the gate proved itself
    needs: gate
    # Bare always(), for the same reason gate-assert uses it: this job must run even when
    # the gate failed or skipped, or it cannot report what happened.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report and check what the gate returned
        env:
          RESULT: ${{ needs.gate.result }}
          GATE_SHA: ${{ needs.gate.outputs.gate_sha }}
          EXPECTED: ${{ github.sha }}
          # On a negative-test branch the gate is EXPECTED to fail, so invert the check.
          # Set by the branch name, not by an input, so it cannot be set by accident.
          EXPECT_FAILURE: ${{ startsWith(github.ref_name, 'tmp/negative-') }}
        run: |
          set -eu
          echo "result=${RESULT} gate_sha=${GATE_SHA:-<empty>} expected_sha=${EXPECTED}"
          if [ "${EXPECT_FAILURE}" = "true" ]; then
            if [ "${RESULT}" = "success" ]; then
              echo "::error::NEGATIVE TEST FAILED: the gate reported success on a branch that deliberately breaks it. The gate is not real."
              exit 1
            fi
            echo "OK: the gate correctly refused to pass (result=${RESULT})."
            exit 0
          fi
          if [ "${RESULT}" != "success" ]; then
            echo "::error::the gate did not succeed (result=${RESULT})"
            exit 1
          fi
          if [ "${GATE_SHA}" != "${EXPECTED}" ]; then
            echo "::error::gate_sha '${GATE_SHA}' does not match the tested SHA '${EXPECTED}'"
            exit 1
          fi
          echo "OK: the gate ran every connector and returned a matching proof."
