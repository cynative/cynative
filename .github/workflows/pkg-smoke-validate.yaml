# TEMPORARY branch-only scaffold: validates test/pkg.smoke.test.sh on real
# macOS runners against the published v1.5.1 pkgs. Deleted before the PR.
name: pkg smoke validation (temporary)

on:
  push:
    branches: [test/macos-pkg-install-smoke]

permissions:
  contents: read

jobs:
  smoke:
    name: validate pkg smoke (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            pkg: cynative_Darwin_arm64.pkg
            sha: c0c3acdb28b424922a7583a7273040f997e6c784ce01c68412e9ad84ef26c7d9
          - runner: macos-26-intel
            pkg: cynative_Darwin_x86_64.pkg
            sha: cee002d5ba1d8ba0faa368c266ef7524128272847d28bd1a9dbc6a6266050ad4
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download published v1.5.1 pkg
        env:
          PKG: ${{ matrix.pkg }}
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/${PKG}" \
            "https://github.com/cynative/cynative/releases/download/v1.5.1/${PKG}"

      - name: Run pkg smoke
        timeout-minutes: 10
        env:
          PKG: ${{ matrix.pkg }}
          SHA: ${{ matrix.sha }}
        run: |
          PKG_PATH="${RUNNER_TEMP}/${PKG}" SMOKE_VERSION=1.5.1 \
            EXPECTED_SHA256="${SHA}" sh test/pkg.smoke.test.sh
