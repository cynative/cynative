name: CodeQL

# Security-focused static analysis for Go. Complements make check (correctness)
# with CodeQL's query suite. Non-required initially; Scorecard's SAST check
# looks for recognized analyzer check runs on commits (#179).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: pick up newly published queries against unchanged code.
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      # Required for private-repo / Advanced Security status checks; harmless on public.
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: go
          build-mode: manual

      - name: Build
        # Race tests need CGO; CodeQL only needs a plain build. Match the issue's
        # default-build guidance without pulling in the full make check gate.
        run: CGO_ENABLED=0 go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: '/language:go'
