name: Install e2e

# Builds the release archives once (a goreleaser snapshot) and runs the real installer
# against them per OS: Linux today, Windows here, macOS later. Runs on EVERY pull request,
# but the heavy build+install only runs for release-please PRs (or a manual dispatch);
# every other PR skips it. Mirrors .github/workflows/pkg-tools.yaml. None of these jobs are
# required status checks, so a skipped/failing OS install job never blocks a normal PR -
# they gate release-please PRs and on-demand runs, catching an installer regression before
# a release.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: Detect release-please PR
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - name: Detect release-please PR
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          relevant=false
          # Manual dispatch is an intentional run on any branch.
          [ "${EVENT}" = "workflow_dispatch" ] && relevant=true
          # release-please's branch name is deterministic and present from PR creation
          # (verified on PRs #31/#29) - the primary, reliable signal.
          [ "${HEAD_REF}" = "release-please--branches--main" ] && relevant=true
          # The autorelease label is a secondary fallback (it can lag creation).
          case ",${LABELS}," in *",autorelease: pending,"*) relevant=true ;; esac
          echo "relevant=${relevant}" >> "${GITHUB_OUTPUT}"
          if [ "${relevant}" = "true" ]; then
            echo "Release-please PR or manual dispatch - running the install e2e."
          else
            echo "Not a release-please PR - skipping the heavy e2e (install jobs skip)."
          fi

  snapshot:
    name: Build release snapshot
    needs: detect
    if: needs.detect.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # fetch-depth: 0 gets full history + tags so goreleaser can derive the snapshot
      # version from the latest release tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Report tested head SHA
        run: echo "Testing PR head SHA ${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Build the release snapshot
        run: make snapshot
      # Upload only what the installer tests consume: the archives, the checksums, and the
      # metadata (the stamped version). The common dist/ prefix is stripped, so the files
      # land flat in each consumer's download dir.
      - name: Upload the release archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/metadata.json
          if-no-files-found: error
          retention-days: 1

  linux-install-e2e:
    name: Linux install e2e
    needs: [detect, snapshot]
    if: needs.detect.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Report tested head SHA
        run: echo "Testing PR head SHA ${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Download the release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-snapshot
          path: dist
      - name: Run the Linux install e2e
        run: sh test/install.e2e.test.sh ./dist

  windows-install-e2e:
    name: Windows install e2e
    needs: [detect, snapshot]
    if: needs.detect.outputs.relevant == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Report tested head SHA
        run: echo "Testing PR head SHA ${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Download the release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-snapshot
          path: artifact
      - name: Run the Windows installer e2e under Windows PowerShell 5.1
        shell: powershell # 5.1, not pwsh (7) - the floor install.ps1 targets.
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = (Get-Location).Path
          if (-not (Get-Command python -ErrorAction SilentlyContinue)) { throw 'python not found (fixture server)' }

          # Stub gh so install.ps1's attestation step makes no live network call: the runner
          # ships gh, and CYNATIVE_REQUIRE_ATTESTATION=0 makes the stubbed failure non-fatal.
          # Prepend the stub dir to PATH so Get-Command gh resolves it first (both here and
          # in the child powershell the test spawns, which inherits this env).
          $stub = Join-Path $env:RUNNER_TEMP 'stub'
          New-Item -ItemType Directory -Force -Path $stub | Out-Null
          Set-Content -LiteralPath (Join-Path $stub 'gh.cmd') -Value '@exit 1' -Encoding Ascii
          $env:PATH = "$stub;$env:PATH"

          # Install Pester from Windows PowerShell 5.1 itself (so module paths match the
          # shell under test), pinned to the same version make pwsh-test uses. TLS 1.2 is
          # forced because the 5.1 default handshake is rejected by the PowerShell Gallery.
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -RequiredVersion 5.7.1 -Force # avoid the OS-bundled Pester 3.x

          # Serve a COPY of the downloaded archives from a loopback fixture (the shared
          # serve-fixture.py). The copy lets the checksum-mismatch test tamper the zip
          # without touching the download.
          $srv = Join-Path $env:RUNNER_TEMP 'srv'
          New-Item -ItemType Directory -Force -Path $srv | Out-Null
          Copy-Item -Path (Join-Path $repo 'artifact\*') -Destination $srv -Force
          $portfile = Join-Path $env:RUNNER_TEMP 'port'
          if (Test-Path -LiteralPath $portfile) { Remove-Item -LiteralPath $portfile -Force }
          $server = Start-Process python -PassThru `
            -ArgumentList @((Join-Path $repo 'test\serve-fixture.py'), $srv, $portfile)

          $failed = 1
          try {
            $port = $null
            foreach ($i in 1..100) {
              if ((Test-Path -LiteralPath $portfile) -and ((Get-Item -LiteralPath $portfile).Length -gt 0)) {
                $port = (Get-Content -Raw -LiteralPath $portfile).Trim(); break
              }
              Start-Sleep -Milliseconds 100
            }
            if (-not $port) { throw 'fixture server did not start' }

            # Env for the installer and the Pester test. The base URL is overridden to the
            # loopback fixture, so CYNATIVE_VERSION only names the (unused) URL path; the
            # asserted version is the goreleaser-stamped one read from metadata.json.
            $env:CYNATIVE_BASE_URL            = "http://127.0.0.1:$port"
            $env:CYNATIVE_VERSION             = 'v0.0.0-e2e'
            $env:CYNATIVE_REQUIRE_ATTESTATION = '0'
            $installDir                       = Join-Path $env:RUNNER_TEMP 'bin'
            $env:CYNATIVE_INSTALL_DIR         = $installDir
            $env:CYN_E2E_INSTALL_DIR          = $installDir
            $env:CYN_E2E_STAGE                = $srv
            $env:CYN_E2E_WANT_VERSION         = (Get-Content -Raw -LiteralPath (Join-Path $srv 'metadata.json') | ConvertFrom-Json).version

            # Fail fast with a clear message if the fixture is incomplete. The archive name is
            # derived (not hardcoded) so this stays correct if the runner arch changes.
            . (Join-Path $repo 'install.ps1')
            $archive = Get-CynArchiveName -Arch (Resolve-CynArch)
            foreach ($f in @($archive, 'checksums.txt', 'metadata.json')) {
              if (-not (Test-Path -LiteralPath (Join-Path $srv $f))) { throw "missing fixture file: $f" }
            }

            $r = Invoke-Pester -Path (Join-Path $repo 'test\install.e2e.Tests.ps1') -Output Detailed -PassThru
            $failed = $r.FailedCount
          } finally {
            if ($server -and -not $server.HasExited) { Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue }
          }
          # Exit explicitly on both branches: the last child process inside the suite (the
          # checksum-mismatch install) exits non-zero by design, so $LASTEXITCODE is left
          # non-zero even when every test passed. The `powershell` shell appends
          # `exit $LASTEXITCODE`, which would then fail a green run - so force exit 0 here.
          if ($failed -gt 0) { exit 1 }
          exit 0
