name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Bootstrap pinned script-check tools
        run: |
          set -euo pipefail
          # Versions come from the Makefile (single source of truth).
          sc_ver="$(make -s print-SHELLCHECK_VERSION)"
          sc_sha="$(make -s print-SHELLCHECK_SHA256)"
          pester_ver="$(make -s print-PESTER_VERSION)"
          pssa_ver="$(make -s print-PSSCRIPTANALYZER_VERSION)"
          # Pinned shellcheck: download + verify SHA-256, no Docker; prepend to PATH.
          curl -sSfL "https://github.com/koalaman/shellcheck/releases/download/v${sc_ver}/shellcheck-v${sc_ver}.linux.x86_64.tar.xz" -o /tmp/sc.tar.xz
          echo "${sc_sha}  /tmp/sc.tar.xz" | sha256sum -c -
          tar -xJf /tmp/sc.tar.xz -C /tmp
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "/tmp/shellcheck-v${sc_ver}/shellcheck" "$HOME/.local/bin/shellcheck"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Pinned PowerShell modules (preinstalled on ubuntu-latest; pinned for reproducibility).
          pwsh -NoProfile -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted; Install-Module Pester -RequiredVersion ${pester_ver} -Force -Scope CurrentUser -SkipPublisherCheck; Install-Module PSScriptAnalyzer -RequiredVersion ${pssa_ver} -Force -Scope CurrentUser"

      - name: Check
        run: make check
