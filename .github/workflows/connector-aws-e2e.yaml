name: Live AWS connector e2e

# Runs the real `cynative -p` against the dedicated CI AWS account through the aws
# connector (cynative#52): a read of an inert fixture IAM role's tag plus a write-deny
# canary, proving read-only enforcement end to end. Mirrors connector-gcp-e2e.yaml's
# detect gating so the heavy live run only fires for release-please PRs or a manual
# dispatch. Authenticates via keyless GitHub OIDC under a static `environment: aws-ci`
# (the stable OIDC subject the AWS role trusts, so a maintainer can dispatch this from
# any branch with no per-branch AWS trust edits); the credential step is gated to
# same-repo events so untrusted forks never reach it. Not a required status check.
#
# Credential wiring is the INVERSE of llm-smoke.yaml's bedrock job. That job sets
# output-env-credentials: false precisely so AWS_* never enters the env and the aws
# connector stays dark. Here AWS_* IS exported, on purpose, so the connector registers
# and the run has something to gate. Bedrock still gets its own credentials inline via
# CYNATIVE_LLM_BEDROCK_*, so the model path never rides the connector's scoped chain.
#
# Three entry points. The Release Pipeline calls it as a PRE-PUBLISH GATE
# (workflow_call with gate: true), so a release cannot publish while the read-only
# boundary is broken; maintainers can dispatch it manually; and it self-gates on PRs
# to release-please only.
on:
  workflow_call:
    inputs:
      gate:
        description: Force the live run (the Release Pipeline sets this to gate publish).
        type: boolean
        default: false
      ref:
        description: >-
          Commit to test. The Release Pipeline passes the SHA the release was tagged at,
          which is not necessarily the SHA that triggered the pipeline. Empty means the
          default checkout ref.
        type: string
        default: ''
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

# A stale synchronize event must not multiply live-run spend, so PR runs dedupe per PR
# and cancel their predecessor.
#
# The gate path gets a group of its own, keyed on the run id. A called workflow's
# concurrency group is evaluated in the CALLER's context, so without this a release's
# gate would share a group with any standalone run on the same ref (a manual dispatch,
# say) and could be queued behind it or cancelled by it. A cancelled gate fails
# gate-assert below, blocking a release for a reason that has nothing to do with the
# release. Cancellation stays scoped to pull_request runs for the same reason.
concurrency:
  group: connector-aws-e2e-${{ inputs.gate && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !inputs.gate }}

jobs:
  detect:
    name: Detect release-please PR
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - name: Detect release-please PR
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GATE: ${{ inputs.gate }}
        run: |
          relevant=false
          # The workflow_call path is the Release Pipeline's publish gate, and it MUST key
          # on the input rather than the event. A called workflow inherits the CALLER's
          # event (push), so an event check here would report "not relevant" and the live
          # job would SKIP.
          #
          # That would not merely be an inert gate, it would be a fail-OPEN one: GitHub
          # reports a conditionally skipped job as a SUCCESS to its caller, so publish's
          # `result == 'success'` check would be satisfied and the release would ship with
          # its read-only boundary never tested. The gate-assert job below is the backstop
          # that turns that silence into a hard failure.
          [ "${GATE}" = "true" ] && relevant=true
          [ "${EVENT}" = "workflow_dispatch" ] && relevant=true
          [ "${HEAD_REF}" = "release-please--branches--main" ] && relevant=true
          case ",${LABELS}," in *",autorelease: pending,"*) relevant=true ;; esac
          echo "relevant=${relevant}" >> "${GITHUB_OUTPUT}"
          if [ "${relevant}" = "true" ]; then
            echo "Release gate, release-please PR, or manual dispatch - running the live AWS connector e2e."
          else
            echo "Not a release-please PR - skipping the live AWS connector e2e."
          fi

  aws-connector:
    name: AWS connector read + canary
    needs: detect
    # Run only when relevant AND on a trusted path: this repository's own Release
    # Pipeline gate (which only ever runs from an already-merged commit on main), a
    # manual dispatch (no PR context), or a same-repo PR.
    #
    # The `github.repository` guard is not redundant. This is a PUBLIC reusable
    # workflow, so ANY public repository - including a fork - may call it, pass
    # gate: true, and grant itself id-token: write. The cloud trust policies would still
    # refuse to mint credentials (GCP pins assertion.repository, and the AWS role pins
    # the exact subject), but the guard is what actually makes "a fork never reaches the
    # credential step" true rather than merely survivable.
    #
    # `inputs.gate` is undefined on every non-call event, and an undefined context
    # property is an empty string, which is falsy.
    if: >-
      github.repository == 'cynative/cynative' &&
      needs.detect.outputs.relevant == 'true' &&
      (inputs.gate ||
       github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # Headroom for two phases, each retried once, at the per-phase timeout below.
    timeout-minutes: 25
    # Static, so the OIDC subject stays repo:cynative/cynative:environment:aws-ci
    # regardless of branch or event.
    environment: aws-ci
    permissions:
      contents: read
      id-token: write # mint the OIDC token for the AWS role assumption
    steps:
      # On the release path the caller passes the SHA the release was TAGGED at, which is
      # not necessarily the SHA that triggered the pipeline: release-please re-derives its
      # work from repository state, so main can advance in between. Testing the triggering
      # commit instead would gate the release on code that is not the code being released.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
      - name: Report tested SHA
        run: |
          echo "Testing SHA $(git rev-parse HEAD)"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # Fail loudly on a missing or renamed variable: configure-aws-credentials' own
      # error is otherwise opaque, and the suite must never go green by skipping.
      - name: Preflight the required repo variables
        env:
          ROLE: ${{ vars.CYNATIVE_CLI_CI_AWS_ROLE }}
          REGION: ${{ vars.CYNATIVE_CLI_CI_BEDROCK_REGION }}
          MODEL: ${{ vars.CYNATIVE_CLI_CI_BEDROCK_MODEL }}
          ROLE_NAME: ${{ vars.AWS_E2E_ROLE_NAME }}
          EXPECT: ${{ vars.AWS_E2E_EXPECT }}
          ACCOUNT: ${{ vars.AWS_E2E_ACCOUNT }}
        run: |
          missing=
          [ -n "${ROLE}" ]      || missing="${missing} CYNATIVE_CLI_CI_AWS_ROLE"
          [ -n "${REGION}" ]    || missing="${missing} CYNATIVE_CLI_CI_BEDROCK_REGION"
          [ -n "${MODEL}" ]     || missing="${missing} CYNATIVE_CLI_CI_BEDROCK_MODEL"
          [ -n "${ROLE_NAME}" ] || missing="${missing} AWS_E2E_ROLE_NAME"
          [ -n "${EXPECT}" ]    || missing="${missing} AWS_E2E_EXPECT"
          [ -n "${ACCOUNT}" ]   || missing="${missing} AWS_E2E_ACCOUNT"
          if [ -n "${missing}" ]; then
            echo "FAIL: missing repo variables:${missing}"
            exit 1
          fi
      # AWS_* IS exported downstream (unlike the bedrock smoke), so the aws connector
      # registers. output-credentials also emits the three credential outputs, which
      # feed Bedrock inline so the LLM path does not depend on the connector's chain.
      - name: Authenticate to AWS (GitHub OIDC)
        id: aws
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.CYNATIVE_CLI_CI_AWS_ROLE }}
          aws-region: ${{ vars.CYNATIVE_CLI_CI_BEDROCK_REGION }}
          output-credentials: true
      - name: Run the AWS connector e2e
        env:
          CYNATIVE_LLM_PROVIDER: bedrock
          CYNATIVE_LLM_MODEL: ${{ vars.CYNATIVE_CLI_CI_BEDROCK_MODEL }}
          CYNATIVE_LLM_BEDROCK_REGION: ${{ vars.CYNATIVE_CLI_CI_BEDROCK_REGION }}
          CYNATIVE_LLM_BEDROCK_ACCESS_KEY: ${{ steps.aws.outputs.aws-access-key-id }}
          CYNATIVE_LLM_BEDROCK_SECRET_KEY: ${{ steps.aws.outputs.aws-secret-access-key }}
          CYNATIVE_LLM_BEDROCK_SESSION_TOKEN: ${{ steps.aws.outputs.aws-session-token }}
          AWS_E2E_ROLE_NAME: ${{ vars.AWS_E2E_ROLE_NAME }}
          AWS_E2E_EXPECT: ${{ vars.AWS_E2E_EXPECT }}
          AWS_E2E_ACCOUNT: ${{ vars.AWS_E2E_ACCOUNT }}
          # CI's principal is an assumed role, so cynative's credential scoping engages
          # and the posture must read client+aws exactly. A degrade to `client` means the
          # self-assume trust statement on the CI role is gone, and the run is only
          # client-gated; the suite fails rather than quietly accepting that.
          AWS_E2E_ENFORCED: client+aws
          # A tool-driven run needs more than the no-tool defaults, and the first
          # authorization cold-fetches the configured policy plus a Smithy model archive.
          AWS_E2E_TIMEOUT: "240"
          AWS_E2E_MAX_TOKENS: "100000"
          # Missing or renamed vars must fail the job, never silently skip.
          AWS_E2E_REQUIRE_RUN: "1"
        run: make connector-aws-e2e

  # ---- The gate's fail-closed assertion --------------------------------------
  # A conditionally SKIPPED job reports success to its caller. So if the live job above
  # ever silently stops running on the gate path (a renamed input, a detect condition
  # that stops matching, a typo in the `if:`), this workflow would still conclude
  # "success" and the Release Pipeline would publish a release whose read-only boundary
  # was never tested. That is the one failure mode a safety gate must not have.
  #
  # This job exists purely to turn that silence into a hard failure. It runs only on the
  # gate path, and it demands the live job actually SUCCEEDED - not merely "did not fail".
  gate-assert:
    name: Assert the gate actually ran
    needs: [detect, aws-connector]
    if: ${{ always() && inputs.gate }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: The live connector job must have succeeded
        env:
          RESULT: ${{ needs.aws-connector.result }}
          RELEVANT: ${{ needs.detect.outputs.relevant }}
        run: |
          if [ "${RESULT}" != "success" ]; then
            echo "::error::The release gate was requested (gate: true) but the live AWS connector job did not succeed (result=${RESULT}, detect.relevant=${RELEVANT}). A skipped job reports success to the caller, so this assertion is what keeps the release gate fail-closed."
            exit 1
          fi
          echo "OK: the live AWS connector job ran and succeeded, so the gate is real."
