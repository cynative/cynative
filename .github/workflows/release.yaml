name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

# At most one release run executes at a time. GitHub may skip intermediate
# queued runs in the group; that is fine — each run re-derives its work from
# repository state via release-please.
concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      # Consumed directly by the pre-publish smoke, publish, candidate-pr,
      # and post-publish channel jobs below (each lists `release` in its own
      # needs and reads these outputs directly).
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      sha: ${{ steps.release-please.outputs.sha }}
      release_id: ${{ steps.draft.outputs.release_id }}
    # Bound the job: the concurrency group means a wedged run blocks later
    # releases for the default 360 minutes otherwise. The budget covers the
    # capped long steps (goreleaser 35, pkg build/notarize 20, audit 10) plus
    # every short step with slack to spare, so the job limit can never fire
    # mid-step. Publish and its verification live in the downstream publish
    # job, gated on the pre-publish smoke jobs (macos-pkg-smoke,
    # archive-smoke).
    timeout-minutes: 90
    steps:
      # The App must grant contents: write (tag + release), pull-requests:
      # write (release PRs), and Administration: read (the publish step's
      # immutable-releases gate).
      - name: Generate App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            cynative
            homebrew-tap

      # release-please PHASE 1 — releases only (skip-github-pull-request):
      # creates the GitHub release as a DRAFT ("draft": true in
      # release-please-config.json), titled exactly like the tag. The tag is
      # lazy — it does not exist until this workflow publishes at the end.
      # The next-release candidate PR is deliberately NOT computed here: a
      # just-created draft is invisible to release-please (lazy tag, null
      # tagCommit), so a candidate computed now would be draft-blind and span
      # bogus history (observed live: full-history 0.4.0 candidates right
      # after v0.3.1 and v0.3.2). Phase 2 (the candidate-pr job) computes the
      # candidate at the end of the run, once the release is published and
      # visible.
      #
      # RECOVERY after a failed run (nothing published, nothing immutable):
      #   gh release delete <tag> --yes
      #   gh api -X DELETE repos/cynative/cynative/git/refs/tags/<tag>
      #     ^ ONLY if this flow created the tag (or it is confirmed stale
      #       debris of a prior failed run). If "Ensure release tag" failed
      #       because a PRE-EXISTING tag points at the wrong SHA, that tag is
      #       not this pipeline's to delete — investigate first.
      #   Restore the release PR's label (release-please tracks released-ness
      #   via labels, so a bare re-run would otherwise no-op):
      #     gh api -X DELETE \
      #       repos/cynative/cynative/issues/<pr>/labels/autorelease%3A%20tagged
      #     gh api repos/cynative/cynative/issues/<pr>/labels \
      #       -f "labels[]=autorelease: pending"
      #   Then re-run the workflow; release-please recreates the draft. The
      #   pre-publish gate spans the release job, the smoke jobs
      #   (macos-pkg-smoke, archive-smoke), and the publish job; a failure in
      #   any of them, up to and including the publish
      #   job's re-assertions, leaves the draft intact and these notes apply.
      #   "Publish release" refuses to run while the repo's immutable-releases
      #   setting is disabled (the draft stays intact). If "Verify published
      #   release" fails, the release is already live — investigate its
      #   content/attestation; if bad, ship a follow-up patch release
      #   (in-place repair is impossible by design).
      - id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          skip-github-pull-request: true

      # The tag does not exist yet, so check out the exact SHA release-please
      # cut the release from. submodules: recursive is required so the
      # packaging toolchain (bomutils/xar) is available to install-pkg-tools.sh.
      - name: Checkout code
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ steps.release-please.outputs.sha }}
          submodules: recursive

      # Materialize the release tag at the verified SHA (or hard-fail if a
      # pre-existing tag points elsewhere), then fetch it so goreleaser sees a
      # tagged HEAD.
      - name: Ensure release tag
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          TAG: ${{ steps.release-please.outputs.tag_name }}
          SHA: ${{ steps.release-please.outputs.sha }}
        run: |
          scripts/release/ensure-tag.sh "${GITHUB_REPOSITORY}" "${TAG}" "${SHA}"
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"

      - name: Set up Go
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Verify signing secrets
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_INSTALLER_P12: ${{ secrets.MACOS_INSTALLER_P12 }}
          MACOS_INSTALLER_PASSWORD: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
        run: |
          missing=0
          for var in MACOS_SIGN_P12 MACOS_SIGN_PASSWORD MACOS_NOTARY_ISSUER_ID MACOS_NOTARY_KEY_ID MACOS_NOTARY_KEY MACOS_INSTALLER_P12 MACOS_INSTALLER_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::required signing secret ${var} is empty"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Install packaging tools & stage signing material
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        run: |
          umask 077
          scripts/release/install-pkg-tools.sh
          d="$(mktemp -d)"
          printf '%s' "${MACOS_SIGN_P12}" | base64 -d > "${d}/app.p12"
          printf '%s' "${MACOS_SIGN_PASSWORD}" > "${d}/app.pw"
          chmod 600 "${d}/app.p12" "${d}/app.pw"
          { echo "MACOS_SIGN_P12_FILE=${d}/app.p12"; echo "MACOS_SIGN_PASSWORD_FILE=${d}/app.pw"; } >> "${GITHUB_ENV}"

      # Builds and signs darwin binaries via goreleaser hooks (signing material
      # is available via MACOS_SIGN_P12_FILE/MACOS_SIGN_PASSWORD_FILE exported
      # in the previous step). GoReleaser no longer notarizes; the dedicated
      # "Build, sign, notarize & staple macOS pkgs" step below handles that.
      - name: Run GoReleaser
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        # Step-level cap so a wedged build fails cleanly while the draft is
        # still recoverable, before the downstream smoke and publish jobs
        # ever schedule (publication itself happens in the publish job).
        timeout-minutes: 35
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
        run: |
          set -o pipefail
          go tool goreleaser release --clean 2>&1 | tee /tmp/goreleaser.log

      # Assert the release binary is version-stamped, not "dev". The Go linker
      # silently ignores an unknown -X symbol path, so a typo'd, renamed, or
      # template-drifted stamp path would ship a binary that prints "dev" with no
      # build error. Executing the built artifact (rather than re-reading config)
      # catches all three permanently. Runs pre-publish, so a failure aborts the
      # release with the draft intact instead of publishing a mis-stamped binary.
      - name: Assert release binary is version-stamped
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          TAG: ${{ steps.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          # The glob is the command on purpose: goreleaser emits exactly one
          # linux_amd64 binary directory per release build.
          # shellcheck disable=SC2211
          out="$(dist/*_linux_amd64*/cynative --version)"
          echo "${out}"
          # Exact match on the first line, not a prefix: a prefix would also accept a
          # mis-stamp like "cynative 1.2.30" or "cynative 1.2.3-dev" for tag v1.2.3.
          if [ "${out%%$'\n'*}" != "cynative ${TAG#v}" ]; then
            echo "::error::--version first line is not exactly 'cynative ${TAG#v}'"
            exit 1
          fi
          echo "release binary version-stamped OK"

      - name: Build, sign, notarize & staple macOS pkgs
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        timeout-minutes: 20
        env:
          MACOS_INSTALLER_P12: ${{ secrets.MACOS_INSTALLER_P12 }}
          MACOS_INSTALLER_PASSWORD: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          VERSION: ${{ steps.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          umask 077                                   # secret files default-private (Codex M3)
          d="$(mktemp -d)"; trap 'rm -rf "${d}"' EXIT
          printf '%s' "${MACOS_INSTALLER_P12}" | base64 -d > "${d}/inst.p12"
          printf '%s' "${MACOS_INSTALLER_PASSWORD}" > "${d}/inst.pw"
          printf '%s' "${MACOS_NOTARY_KEY}" | base64 -d > "${d}/notary.p8" 2>/dev/null \
            || printf '%s' "${MACOS_NOTARY_KEY}" > "${d}/notary.p8"
          rcodesign encode-app-store-connect-api-key -o "${d}/notary.json" \
            "${MACOS_NOTARY_ISSUER_ID}" "${MACOS_NOTARY_KEY_ID}" "${d}/notary.p8"
          chmod 600 "${d}/inst.p12" "${d}/inst.pw" "${d}/notary.p8" "${d}/notary.json"
          ver="${VERSION#v}"
          : > /tmp/pkg-assets.tsv
          for pair in "arm64:arm64" "amd64:x86_64"; do
            goarch="${pair%%:*}"; label="${pair##*:}"
            # jq -er + exactly-one-match guard so a miss errors instead of yielding "" (Codex m1).
            bin="$(jq -er --arg a "${goarch}" 'map(select(.type=="Binary" and .goos=="darwin" and .goarch==$a))|if length==1 then .[0].path else error("expected one darwin binary for "+$a) end' dist/artifacts.json)"
            tgz="$(jq -er --arg n "cynative_Darwin_${label}.tar.gz" 'map(select(.type=="Archive" and .name==$n))|if length==1 then .[0].path else error("expected one archive "+$n) end' dist/artifacts.json)"
            pkg="dist/cynative_Darwin_${label}.pkg"
            scripts/release/assemble-macos-pkg.sh "${goarch}" "${bin}" "${ver}" "${pkg}"
            MACOS_INSTALLER_P12_FILE="${d}/inst.p12" MACOS_INSTALLER_PASSWORD_FILE="${d}/inst.pw" \
              MACOS_NOTARY_API_KEY_JSON="${d}/notary.json" \
              scripts/release/sign-notarize-pkg.sh "${pkg}"
            scripts/release/assert-pkg.sh "${pkg}" "${bin}"
            scripts/release/assert-binary-equivalence.sh "${bin}" "${tgz}" "${pkg}"
            printf '%s\t%s\t%s\n' "$(basename "${pkg}")" "$(sha256sum "${pkg}" | cut -d' ' -f1)" "${pkg}" >> /tmp/pkg-assets.tsv
          done
          cat /tmp/pkg-assets.tsv

      # Refresh the installation token before the draft-critical writes (pkg
      # upload, draft and asset assertions): the original token (minted at job
      # start, 60-min lifetime) can be near expiry after GoReleaser + the pkg
      # build/notarize steps, and a 401 here would strand an un-asserted draft
      # after all artifacts were built. The downstream publish job mints its
      # own fresh token.
      - name: Refresh App Token (pre-publish)
        id: prepublish-token
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            cynative
            homebrew-tap

      - name: Upload pkgs to draft release
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.prepublish-token.outputs.token }}
          TAG: ${{ steps.release-please.outputs.tag_name }}
        run: gh release upload "${TAG}" dist/*.pkg --clobber --repo "${GITHUB_REPOSITORY}"

      # ---- Pre-publish assertions ----------------------------------------
      # Everything below until "Publish release" runs while the release is
      # still an editable draft: any failure leaves nothing published and
      # nothing immutable.

      - name: Assert single draft release
        id: draft
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.prepublish-token.outputs.token }}
          TAG: ${{ steps.release-please.outputs.tag_name }}
        run: |
          release_id="$(scripts/release/assert-draft.sh "${GITHUB_REPOSITORY}" "${TAG}")"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

      - name: Assert exact asset set
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.prepublish-token.outputs.token }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          scripts/release/expected-assets.sh dist > /tmp/expected-assets.tsv
          cat /tmp/pkg-assets.tsv >> /tmp/expected-assets.tsv
          LC_ALL=C sort -o /tmp/expected-assets.tsv /tmp/expected-assets.tsv
          scripts/release/assert-assets.sh "${GITHUB_REPOSITORY}" "${RELEASE_ID}" /tmp/expected-assets.tsv

      # Pre-publish formula gate: render the formula from the asserted asset
      # manifest and `brew audit --strict` it in a throwaway local tap.
      # Failing here stops the release with the draft intact and the tap
      # untouched, so a broken formula can never strand a published release
      # behind a stale tap. Offline by necessity: draft assets are not
      # publicly downloadable, so --online checks are impossible pre-publish.
      # The 10 minute budget covers brew audit's first-run bundler-gem
      # bootstrap (rubocop and friends download on the cold runner).
      - name: Audit Homebrew formula
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        timeout-minutes: 10
        env:
          VERSION: ${{ steps.release-please.outputs.tag_name }}
        run: scripts/release/audit-formula.sh "${VERSION#v}" /tmp/expected-assets.tsv

      # Hand-off to the pre-publish smoke jobs and the publish job. Sole
      # producer of this artifact (downstream jobs only consume it):
      # macos-pkg-smoke consumes the pkgs, archive-smoke consumes the
      # Linux/Windows archives plus checksums.txt, and the publish job
      # re-asserts the draft against these manifests. "Assert exact asset
      # set" above proved the draft assets' sha256 digests equal these local
      # bytes, so smoking the artifact is provenance-equivalent to smoking
      # the draft assets, with no token handed to the smoke jobs. Staged
      # flat, keyed by asset name. Future pre-publish smokes consume this
      # same artifact: add files here, never a second producer.
      - name: Stage release artifacts for smoke & publish
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        run: |
          set -euo pipefail
          staged="${RUNNER_TEMP}/release-artifacts"
          mkdir -p "${staged}"
          while IFS=$'\t' read -r name _ path; do
            cp "${path}" "${staged}/${name}"
          done < /tmp/expected-assets.tsv
          cp /tmp/pkg-assets.tsv /tmp/expected-assets.tsv "${staged}/"
          ls -l "${staged}"

      - name: Upload release artifacts
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: ${{ runner.temp }}/release-artifacts/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  # ---- Pre-publish install gate ---------------------------------------
  # Real install-and-run smoke of the macOS pkgs (cynative#44), between the
  # draft build and publish: a package that Gatekeeper or installer(8)
  # rejects, or whose installed binary does not run, fails here while the
  # release is still an editable draft (recovery notes above apply
  # unchanged). Each pkg runs on its native arch: Distribution pins
  # hostArchitectures, and the labels are pinned images (macos-latest moves
  # under our feet mid-migration). No secrets and no token: the job consumes
  # only the release-artifacts hand-off.
  macos-pkg-smoke:
    name: macOS pkg install smoke (${{ matrix.runner }})
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            pkg: cynative_Darwin_arm64.pkg
          - runner: macos-26-intel
            pkg: cynative_Darwin_x86_64.pkg
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: ${{ runner.temp }}/release-artifacts

      # The step timeout (inside the job's 15) keeps a hung stapler or spctl
      # from consuming the whole job budget. The manifest lookup fails closed
      # before the script runs: exactly one row for this pkg, well-formed
      # sha256, or no smoke.
      - name: Smoke pkg
        timeout-minutes: 10
        env:
          PKG: ${{ matrix.pkg }}
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          staged="${RUNNER_TEMP}/release-artifacts"
          sha="$(awk -F'\t' -v p="${PKG}" \
            '$1 == p { c++; s = $2 } END { if (c == 1 && s ~ /^[0-9a-f]{64}$/) { print s } else { exit 1 } }' \
            "${staged}/pkg-assets.tsv")" \
            || { echo "::error::pkg-assets.tsv must hold exactly one well-formed row for ${PKG}"; exit 1; }
          PKG_PATH="${staged}/${PKG}" SMOKE_VERSION="${TAG#v}" EXPECTED_SHA256="${sha}" \
            sh test/pkg.smoke.test.sh

  # ---- Pre-publish archive install gate --------------------------------
  # Real extract-and-run smoke of the Linux/Windows release archives
  # (cynative#43), between the draft build and publish: a truncated archive,
  # a bad layout, a lost executable bit, a checksums.txt row that stopped
  # describing its archive, or a binary that cannot run on its native arch
  # fails here while the release is still an editable draft (recovery notes
  # above apply unchanged). Each archive runs on its native platform + arch;
  # asset names are hard-coded so a platform goreleaser silently dropped
  # cannot lose its leg. The Darwin tarballs are deliberately absent:
  # assert-binary-equivalence.sh proves their payload byte-identical to the
  # pkg payload the macos-pkg-smoke job executes, and it asserts the tar
  # member's executable bit. No secrets and no App token: the job consumes
  # only the release-artifacts hand-off, and checkout credentials are not
  # persisted.
  archive-smoke:
    name: Archive install smoke (${{ matrix.archive }})
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            archive: cynative_Linux_x86_64.tar.gz
          - runner: ubuntu-24.04-arm
            archive: cynative_Linux_arm64.tar.gz
          - runner: windows-latest
            archive: cynative_Windows_x86_64.zip
            arch: amd64
          - runner: windows-11-arm
            archive: cynative_Windows_arm64.zip
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: ${{ runner.temp }}/release-artifacts

      # The manifest lookup fails closed before the script runs: exactly one
      # row for this archive, well-formed sha256, or no smoke. shell: bash
      # runs on every leg (Git Bash on the Windows runners).
      - name: Resolve expected digest
        id: digest
        shell: bash
        env:
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          staged="${RUNNER_TEMP}/release-artifacts"
          sha="$(awk -F'\t' -v a="${ARCHIVE}" \
            '$1 == a { c++; s = $2 } END { if (c == 1 && s ~ /^[0-9a-f]{64}$/) { print s } else { exit 1 } }' \
            "${staged}/expected-assets.tsv")" \
            || { echo "::error::expected-assets.tsv must hold exactly one well-formed row for ${ARCHIVE}"; exit 1; }
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

      # The step timeouts (inside the job's 15) keep a hung extraction or
      # binary from consuming the whole job budget.
      - name: Smoke archive (Linux)
        if: ${{ runner.os == 'Linux' }}
        timeout-minutes: 10
        env:
          ARCHIVE: ${{ matrix.archive }}
          TAG: ${{ needs.release.outputs.tag_name }}
          SHA256: ${{ steps.digest.outputs.sha }}
        run: |
          set -euo pipefail
          staged="${RUNNER_TEMP}/release-artifacts"
          ARCHIVE_PATH="${staged}/${ARCHIVE}" SMOKE_VERSION="${TAG#v}" \
            EXPECTED_SHA256="${SHA256}" CHECKSUMS_PATH="${staged}/checksums.txt" \
            sh test/archive.smoke.test.sh

      - name: Smoke archive (Windows)
        if: ${{ runner.os == 'Windows' }}
        timeout-minutes: 10
        shell: powershell # 5.1, not pwsh (7) - the floor install.ps1 targets.
        env:
          ARCHIVE: ${{ matrix.archive }}
          TAG: ${{ needs.release.outputs.tag_name }}
          SHA256: ${{ steps.digest.outputs.sha }}
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          $staged = Join-Path $env:RUNNER_TEMP 'release-artifacts'
          $env:ARCHIVE_PATH = Join-Path $staged $env:ARCHIVE
          $env:SMOKE_VERSION = $env:TAG -replace '^v', ''
          $env:EXPECTED_SHA256 = $env:SHA256
          $env:CHECKSUMS_PATH = Join-Path $staged 'checksums.txt'
          & .\test\archive.smoke.test.ps1
          exit $LASTEXITCODE

  # ---- Pre-publish read-only-boundary gate ------------------------------
  # The live connector e2es (cynative#39, #52, #53) against the real GCP, AWS, and GitHub
  # fixture accounts, between the draft build and publish: a release whose connector
  # cannot authenticate, cannot read, or - above all - fails to DENY a write
  # fails here while the release is still an editable draft (recovery notes
  # above apply unchanged).
  #
  # These exercise the SOURCE at this SHA, not the built artifacts, so they need
  # no release-artifacts hand-off and run in parallel with the install smokes.
  # They do need OIDC, and a reusable workflow can never exceed its caller's
  # token grant, so the calling job raises the ceiling to id-token: write.
  #
  # `gate: true` is load-bearing, not decoration. A called workflow inherits the
  # CALLER's event (push), so the connector workflows' own event-based gating
  # would report "not a release-please PR" and skip the live job.
  #
  # That failure is fail-OPEN, which is why it matters so much: GitHub reports a
  # conditionally skipped job as a SUCCESS to its caller, so `result == 'success'`
  # below would be satisfied and the release would publish having tested nothing.
  # Each called workflow therefore ends with a `gate-assert` job that hard-fails
  # unless the live job actually SUCCEEDED, which is what makes this gate real.
  connector-gcp-e2e:
    name: Live GCP connector e2e
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    uses: ./.github/workflows/connector-gcp-e2e.yaml
    with:
      gate: true
      ref: ${{ needs.release.outputs.sha }}
    permissions:
      contents: read
      id-token: write

  connector-aws-e2e:
    name: Live AWS connector e2e
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    uses: ./.github/workflows/connector-aws-e2e.yaml
    with:
      gate: true
      ref: ${{ needs.release.outputs.sha }}
    permissions:
      contents: read
      id-token: write

  connector-github-e2e:
    name: Live GitHub connector e2e
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    uses: ./.github/workflows/connector-github-e2e.yaml
    with:
      gate: true
      ref: ${{ needs.release.outputs.sha }}
    secrets:
      GH_E2E_APP_PRIVATE_KEY: ${{ secrets.GH_E2E_APP_PRIVATE_KEY }}
    permissions:
      contents: read
      id-token: write

  # ---- Publish: the instant of immutability ----------------------------
  # Runs only on release runs, once every pre-publish gate has SUCCEEDED.
  # Everything before this job's "Publish release" step still runs against
  # an editable draft: any failure leaves nothing published and nothing
  # immutable. The compound if - !cancelled() plus explicit `== 'success'`
  # result checks (not `!= 'failure'`) - is what makes a skipped or cancelled
  # gate block the publish rather than wave it through. On a plain push
  # (release_created != 'true') this skips: nothing is published, and the
  # candidate-pr job below computes the next-release candidate instead. A
  # green `publish` therefore means "published + verified + tap pushed",
  # nothing more (cynative#140).
  publish:
    name: Publish release
    needs: [release, macos-pkg-smoke, archive-smoke, connector-gcp-e2e, connector-aws-e2e, connector-github-e2e]
    if: ${{ !cancelled() && needs.release.result == 'success' && needs.release.outputs.release_created == 'true' && needs.macos-pkg-smoke.result == 'success' && needs.archive-smoke.result == 'success' && needs.connector-gcp-e2e.result == 'success' && needs.connector-aws-e2e.result == 'success' && needs.connector-github-e2e.result == 'success' }}
    runs-on: ubuntu-latest
    # Budget: the capped steps (artifact download 5, re-assert 5, verify 5)
    # plus every short step with slack, so the job limit can never fire
    # mid-step - in particular never between the publish PATCH and its
    # verification.
    timeout-minutes: 30
    steps:
      # Fresh token on every release run (never inherited): the release job's
      # token cannot be handed across jobs, and the pre-publish smoke wait
      # would leave an inherited token near expiry.
      - name: Generate App Token
        id: publish-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            cynative
            homebrew-tap

      # The publish scripts live in the repo; check out the exact SHA the
      # release was cut from.
      - name: Checkout code
        if: ${{ needs.release.outputs.release_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Download release artifacts
        if: ${{ needs.release.outputs.release_created == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          name: release-artifacts
          path: ${{ runner.temp }}/release-artifacts

      - name: Re-verify tag before publish
        if: ${{ needs.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.publish-token.outputs.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
          SHA: ${{ needs.release.outputs.sha }}
        run: scripts/release/ensure-tag.sh "${GITHUB_REPOSITORY}" "${TAG}" "${SHA}"

      # The draft stayed editable while the pre-publish smoke jobs ran, so
      # prove it
      # still is the one the release job asserted (same id) and still holds
      # exactly the smoked bytes (same exact asset set) immediately before
      # the publish flips it immutable.
      - name: Re-assert draft & exact asset set
        if: ${{ needs.release.outputs.release_created == 'true' }}
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ steps.publish-token.outputs.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
          RELEASE_ID: ${{ needs.release.outputs.release_id }}
        run: |
          set -euo pipefail
          release_id="$(scripts/release/assert-draft.sh "${GITHUB_REPOSITORY}" "${TAG}")"
          if [ "${release_id}" != "${RELEASE_ID}" ]; then
            echo "::error::draft release id changed (${RELEASE_ID} -> ${release_id})"
            exit 1
          fi
          scripts/release/assert-assets.sh "${GITHUB_REPOSITORY}" "${RELEASE_ID}" \
            "${RUNNER_TEMP}/release-artifacts/expected-assets.tsv"

      - name: Publish release
        if: ${{ needs.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.publish-token.outputs.token }}
          RELEASE_ID: ${{ needs.release.outputs.release_id }}
        run: scripts/release/publish-release.sh "${GITHUB_REPOSITORY}" "${RELEASE_ID}"

      # Detection, not gating - publish cannot be rolled back. A failure here
      # means: investigate; if the artifacts are bad, ship a follow-up patch
      # release (in-place repair is impossible by design). All checks are
      # instant reads of the now-frozen release; attestation verification is
      # asynchronous (15-20+ minutes) and lives in the Release Attestation
      # workflow, triggered by the publish above.
      - name: Verify published release
        if: ${{ needs.release.outputs.release_created == 'true' }}
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ steps.publish-token.outputs.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
          RELEASE_ID: ${{ needs.release.outputs.release_id }}
          SHA: ${{ needs.release.outputs.sha }}
        run: |
          # Short retry against API flakes only - every check inside is an
          # immediate read of frozen state.
          for attempt in 1 2 3; do
            if scripts/release/verify-published.sh "${GITHUB_REPOSITORY}" "${TAG}" "${RELEASE_ID}" \
                "${RUNNER_TEMP}/release-artifacts/expected-assets.tsv" "${SHA}"; then
              exit 0
            fi
            echo "verify-published attempt ${attempt}/3 failed"
            if [ "${attempt}" -lt 3 ]; then
              sleep 5
            fi
          done
          echo "::error::post-publish verification failed after 3 attempts"
          exit 1

      - name: Render & push Homebrew formula
        if: ${{ needs.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.publish-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          # expected-assets.tsv (name<TAB>sha256<TAB>path) rode in on the
          # release-artifacts hand-off; publish-tap.sh derives the four
          # tarball digests from its name+sha columns, fails closed on any
          # bad/missing one, writes Formula/cynative.rb, removes the legacy
          # Casks/cynative.rb, and pushes the tap once.
          scripts/release/publish-tap.sh "${ver}" \
            "${RUNNER_TEMP}/release-artifacts/expected-assets.tsv"

  # ---- release-please PHASE 2: the next-release candidate PR ------------
  # Extracted from the publish job (cynative#140) so a flake in this
  # release-please call can never fail `publish` and thereby skip the
  # post-publish channel jobs (all of which gate on `publish`). It runs in
  # parallel with those channel jobs on the same `publish` gate.
  #
  # The compound if mirrors the pattern the publish job used to carry:
  #   - Plain push (release_created != 'true'): the ONLY place the candidate
  #     is created or updated. publish skips on a plain push, so this gates
  #     on the `release` success alone (an explicit if lets a skipped
  #     `publish` need through).
  #   - Release run: waits for `publish` to SUCCEED, so the candidate is
  #     computed with the new release published and visible - never
  #     draft-blind, correctly bounded. A failed or skipped publish (a red
  #     release-critical step, or a skipped pre-publish gate) leaves the
  #     draft unpublished, so `publish.result != 'success'` skips this and no
  #     candidate is created at all.
  # `!cancelled()` blocks a cancelled run. Phase 1 (in the release job) never
  # computes candidates, so draft-blind bogus PRs cannot exist. Residual
  # edge: a push to main while a failed release awaits recovery computes its
  # candidate draft-blind (full-history shape - do not merge it); the next
  # push after recovery rewrites it, or close it manually.
  candidate-pr:
    name: Compute release candidate PR
    needs: [release, publish]
    if: ${{ !cancelled() && needs.release.result == 'success' && (needs.release.outputs.release_created != 'true' || needs.publish.result == 'success') }}
    runs-on: ubuntu-latest
    # Bound the job: one release-please invocation plus its token mint.
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Own token, scoped to cynative only: phase 2 creates/updates the
      # release PR (contents: write + pull-requests: write via the App's
      # installation grant) and touches neither the tap nor the bucket.
      - name: Generate App Token
        id: candidate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cynative

      - name: Compute release candidate PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.candidate-token.outputs.token }}
          skip-github-release: true

  # Post-publish public-channel checks. Failure semantics, shared by the
  # channel smoke jobs: a red `release`, `macos-pkg-smoke`, or
  # `archive-smoke` job, or a red `publish`
  # job that failed BEFORE its "Publish release" step, means the release
  # needs recovery with the draft intact (see the recovery notes above); a
  # red `publish` job AFTER that step means the release is already live and
  # immutable - investigate, and if the artifacts are bad ship a follow-up
  # patch release. A green `publish` with a red channel smoke means the
  # release published fine but that public channel is broken - investigate
  # and re-run (workflow_dispatch on the smoke workflow), nothing to roll
  # back. These jobs gate on `publish` (implicit success() across all of
  # needs; scoop-smoke additionally on scoop-publish), so they run only after
  # the release is published and the tap pushed. The candidate-pr job runs in
  # parallel with them on the same `publish` gate, so a channel-smoke failure
  # cannot block candidate computation, and - the point of cynative#140 - a
  # candidate flake can no longer skip these channel jobs.
  # homebrew-smoke (cynative#45) runs after the tap push and validates the
  # brew channel; install-script-smoke (cynative#47) validates the documented
  # curl|sh and irm|iex install paths against the public release assets;
  # scoop-publish (cynative#103) renders and pushes the Scoop bucket manifest
  # after publish (goreleaser no longer pushes it), and scoop-smoke (cynative#46)
  # then validates the documented scoop bucket add + install path against the
  # public bucket and release assets.
  homebrew-smoke:
    name: Homebrew install smoke
    needs: [release, publish]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/homebrew-smoke.yaml
    with:
      tag: ${{ needs.release.outputs.tag_name }}

  install-script-smoke:
    name: Install-script smoke
    needs: [release, publish]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/install-script-smoke.yaml
    with:
      tag: ${{ needs.release.outputs.tag_name }}

  # Renders and pushes the Scoop bucket manifest after publish (cynative#103),
  # replacing goreleaser's pre-publish bucket push. Only the App credentials are
  # passed (not `secrets: inherit`); the reusable workflow mints its
  # scoop-bucket-scoped, contents:write token from them.
  scoop-publish:
    name: Publish Scoop manifest
    needs: [release, publish]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/scoop-publish.yaml
    with:
      tag: ${{ needs.release.outputs.tag_name }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  scoop-smoke:
    name: Scoop install smoke
    needs: [release, publish, scoop-publish]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/scoop-smoke.yaml
    with:
      tag: ${{ needs.release.outputs.tag_name }}
