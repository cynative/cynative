name: Dependabot auto-merge

# Runs in the trusted default-branch context after CI completes on a PR, so the App key
# (an Actions secret) is never exposed to a Dependabot PR's head-modified workflow code,
# and the merge is attributed to the App so its push to main triggers the Release Pipeline
# (GITHUB_TOKEN merges never trigger further workflows, which left the release PR stale).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

# The dedicated App token performs the body edit and the merge; GITHUB_TOKEN only
# reads the PR to identify it and checks out the trusted default-branch scripts.
permissions:
  contents: read
  pull-requests: read

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      # Identify the PR from the completed run's head SHA using the read-only GITHUB_TOKEN.
      # Only an open, base-main, Dependabot-authored PR whose current head is still exactly
      # that SHA proceeds; everything else no-ops (human PRs, push-triggered CI runs, or a
      # stale run after a Dependabot rebase, which the new head's CI run re-arms), so the
      # App token is never even minted for them.
      - name: Resolve Dependabot PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          num="$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state=="open" and .base.ref=="main" and .user.login=="dependabot[bot]" and .head.sha==env.HEAD_SHA)][0].number // empty')"
          if [ -n "${num}" ]; then
            echo "number=${num}" >> "${GITHUB_OUTPUT}"
            echo "Matched Dependabot PR #${num}"
          else
            echo "No matching open Dependabot PR for ${HEAD_SHA}; nothing to do."
          fi
      # Mint a dedicated-App installation token, scoped to this repo and downscoped to the
      # three permissions arming auto-merge on a workflow-touching PR needs. Only reached
      # for a real Dependabot PR. This is the trusted default-branch workflow, so the key
      # is never handed to unreviewed PR code.
      - name: Generate App Token
        id: app-token
        if: steps.pr.outputs.number != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cynative
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
      # Check out the trusted default-branch copy of the override renderer. A
      # workflow_run job resolves to the default branch's commit, so a Dependabot
      # PR that modifies the script can never influence this run.
      # continue-on-error here too: a checkout failure must degrade to the group title, never
      # block the merge.
      - name: Checkout override renderer
        if: steps.pr.outputs.number != ''
        continue-on-error: true
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout: scripts/ci/dependabot-commit-override.sh
          sparse-checkout-cone-mode: false
      # Rewrite the PR body with a release-please commit-override block so the
      # changelog lists each updated package instead of the opaque group title.
      # Fail-safe: an unparseable message or an already-current body skips the
      # edit and the squash title renders as before; continue-on-error keeps a
      # failure here from ever blocking the merge.
      # The metadata commit is selected by content, not position: a branch updated by a merge
      # from main has a metadata-free head commit, and the bump commit is what carries
      # updated-dependencies.
      - name: Write per-package changelog override
        if: steps.pr.outputs.number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" \
            --jq '[.[].commit.message | select(contains("updated-dependencies:"))] | last // ""' > /tmp/commit-msg
          gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""' > /tmp/pr-body
          # Capture stderr so a budget miss is not misreported as "no metadata"
          # (that ambiguity hid #170 when Dependabot's body hit GitHub's ceiling).
          new_body="$(sh scripts/ci/dependabot-commit-override.sh render /tmp/pr-body < /tmp/commit-msg 2>/tmp/ovr.err)" || true
          if [ -z "${new_body}" ]; then
            if [ -s /tmp/ovr.err ]; then
              cat /tmp/ovr.err
              echo "Leaving the body unchanged."
            else
              echo "No dependency metadata parsed; leaving the body unchanged."
            fi
            exit 0
          fi
          if [ "${new_body}" = "$(cat /tmp/pr-body)" ]; then
            echo "Override already current."
            exit 0
          fi
          gh api -X PATCH "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" -f body="${new_body}"
          echo "Wrote per-package override to PR #${PR_NUMBER}."
      # Arm auto-merge with the App token so the completed merge is attributed to the App
      # and its push to main triggers the Release Pipeline.
      # Retried because the body edit above races the merge: the PATCH fires a
      # pull_request_target "edited" event that re-runs the required "Validate PR title"
      # check, while gh handles GitHub's refusal to arm auto-merge on an already-clean PR
      # by falling back to a direct merge. When the re-run check registers between those
      # two calls, the ruleset rejects the direct merge ("Validate PR title is expected")
      # and nothing re-triggers this workflow. A later attempt converges either way:
      # check still pending arms auto-merge, check finished direct-merges clean.
      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if gh pr merge --auto --squash --repo "${GITHUB_REPOSITORY}" "${PR_NUMBER}"; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Merge attempt ${attempt} rejected; retrying in 20s."
              sleep 20
            fi
          done
          echo "Auto-merge still rejected after 3 attempts." >&2
          exit 1
