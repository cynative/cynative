name: Scoop smoke pre-merge harness

# Temporary pre-merge harness: exercises the reusable scoop-smoke workflow
# from this branch (push-triggered workflows run the branch's own files; a
# same-repo relative `uses:` resolves from the same commit). Removed before
# merge.
on:
  push:
    branches: [test/scoop-install-smoke]

permissions:
  contents: read

jobs:
  scoop-smoke:
    uses: ./.github/workflows/scoop-smoke.yaml
    with:
      tag: v1.5.1
