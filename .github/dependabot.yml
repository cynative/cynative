version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps"

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    # dependency-type "all" turns on updates for indirect (transitive) modules,
    # not just direct ones.
    allow:
      - dependency-type: "all"
    ignore:
      # Untagged nested modules of the charmbracelet/x monorepo. The root module
      # is tagged (v0.1.0) but these submodules have no tags, so Dependabot's Go
      # version discovery mis-resolves them to the root and fails the gomod
      # update (dependency_file_not_resolvable). Deep terminal-UI transitives
      # (via glamour and via goreleaser -> fang). Revisit if charmbracelet tags
      # the x/exp submodules.
      - dependency-name: "github.com/charmbracelet/x/exp/*"
      # go-header v1 is a breaking API rewrite that golangci-lint (which pins
      # the v0.5.x API) cannot compile against, so forcing the major bump on
      # this indirect module breaks `go tool golangci-lint`. Minor/patch
      # updates stay allowed, and once golangci-lint itself requires v1 the
      # module graph will follow without Dependabot's help. Drop this entry
      # when that happens.
      - dependency-name: "github.com/denis-tingaikin/go-header"
        update-types: ["version-update:semver-major"]
      # go-msix v1 is a breaking API rewrite (Builder became an interface,
      # Build takes a context, the Manifest/Identity/Resource types were
      # removed) that goreleaser's nfpm (v2.47.0, the latest release) still
      # calls with the v0.3.x API, so forcing the major bump on this indirect
      # module breaks `make snapshot` (the goreleaser Windows MSIX packager).
      # Minor/patch updates stay allowed, and once nfpm adopts the v1 API the
      # module graph will follow without Dependabot's help. Drop this entry
      # when that happens.
      - dependency-name: "go.digitalxero.dev/go-msix"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
  - package-ecosystem: "cargo"
    directory: "/tools/rcodesign"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
